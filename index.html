<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>picpop — Bilddatenbank</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fbfbfa;
    --panel: #ffffff;
    --fg: #0a0a0a;
    --fg-2: #2a2a28;
    --muted: #767672;
    --line: #ececea;
    --line-strong: #d6d6d2;
    --accent: oklch(60% 0.18 25);
    --accent-soft: oklch(60% 0.18 25 / 0.08);
    --hover: #f3f3f1;
    --faint: #b0b0aa;
    --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px -16px rgba(0,0,0,0.15);
    --radius: 4px;
    --row-h: 44px;
    --sidebar-w: 240px;
    --topbar-h: 56px;
    --font-sans: "Geist", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --font-serif: "Fraunces", Georgia, serif;
  }
  [data-theme="dark"] {
    --bg: #0c0c0b;
    --panel: #131312;
    --fg: #f4f4f1;
    --fg-2: #d8d8d4;
    --muted: #8b8b86;
    --line: #1f1f1d;
    --line-strong: #2e2e2b;
    --hover: #1a1a18;
    --faint: #5a5a56;
    --shadow: 0 1px 0 rgba(0,0,0,0.6), 0 12px 32px -16px rgba(0,0,0,0.6);
  }
  [data-density="compact"] { --row-h: 36px; }
  [data-density="cozy"] { --row-h: 52px; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--fg);
    font-feature-settings: "ss01", "cv11";
    font-size: 14px;
    line-height: 1.45;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100%; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
  input, textarea { font: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: white; }

  .mono { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.02em; text-transform: uppercase; }
  .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .hairline { border-color: var(--line); }
  .scroll { overflow: auto; scrollbar-width: thin; scrollbar-color: var(--line-strong) transparent; }
  .scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

  /* Layout */
  .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; height: 100%; }
  .sidebar { border-right: 1px solid var(--line); background: var(--panel); display: flex; flex-direction: column; min-height: 0; }
  .main { display: grid; grid-template-rows: var(--topbar-h) 1fr; min-width: 0; min-height: 0; }
  .topbar { border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 16px; padding: 0 24px; background: var(--bg); }
  .content { min-height: 0; overflow: auto; }

  /* Striped placeholder used for images that have no real source */
  .ph {
    position: relative;
    background:
      repeating-linear-gradient(135deg, transparent 0 9px, rgba(0,0,0,0.04) 9px 10px),
      linear-gradient(180deg, var(--ph-1, #e9e9e6), var(--ph-2, #dcdcd7));
    overflow: hidden;
  }
  [data-theme="dark"] .ph {
    background:
      repeating-linear-gradient(135deg, transparent 0 9px, rgba(255,255,255,0.04) 9px 10px),
      linear-gradient(180deg, var(--ph-1, #232321), var(--ph-2, #1a1a18));
  }
  .ph::after {
    content: attr(data-label);
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(0,0,0,0.45);
  }
  [data-theme="dark"] .ph::after { color: rgba(255,255,255,0.5); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; height: 32px; padding: 0 12px; border: 1px solid var(--line-strong); border-radius: var(--radius); background: var(--panel); transition: background .18s ease, border-color .18s ease, transform .18s ease, color .18s ease; font-size: 13px; font-weight: 500; white-space: nowrap; }
  .btn:hover { background: var(--hover); }
  .btn:active { transform: scale(0.96); transition-duration: .06s; }
  .btn.primary:hover { transform: translateY(-1px); box-shadow: 0 6px 14px -8px rgba(0,0,0,0.35); }
  .btn.accent:hover { transform: translateY(-1px); box-shadow: 0 6px 14px -8px var(--accent); }
  .btn.primary { background: var(--fg); color: var(--bg); border-color: var(--fg); }
  .btn.primary:hover { opacity: 0.9; }
  .btn.accent { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.ghost { border-color: transparent; background: transparent; }
  .btn.ghost:hover { background: var(--hover); }
  .btn.sm { height: 26px; padding: 0 9px; font-size: 12px; }
  .btn.icon { width: 32px; padding: 0; justify-content: center; }
  .btn.icon.sm { width: 26px; }

  .chip { display: inline-flex; align-items: center; gap: 6px; height: 22px; padding: 0 8px; border: 1px solid var(--line); border-radius: 4px; font-size: 11px; color: var(--fg-2); background: var(--panel); }
  .chip .x { color: var(--muted); cursor: pointer; }
  .chip.solid { background: var(--fg); color: var(--bg); border-color: var(--fg); }

  .kbd { font-family: var(--font-mono); font-size: 10px; padding: 1px 5px; border: 1px solid var(--line-strong); border-radius: 3px; color: var(--muted); }

  /* Input */
  .input { display: flex; align-items: center; gap: 8px; height: 32px; padding: 0 10px; border: 1px solid var(--line-strong); border-radius: var(--radius); background: var(--panel); }
  .input input { flex: 1; border: none; outline: none; background: transparent; font-size: 13px; }
  .input.ghost { border-color: transparent; background: var(--hover); }
  .input.focus, .input:focus-within { border-color: var(--fg); }

  /* Cards */
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); }
  .row { display: flex; align-items: center; }

  /* Modal */
  .scrim { position: fixed; inset: 0; background: rgba(10,10,10,0.4); display: flex; align-items: center; justify-content: center; z-index: 60; animation: fade .15s ease; }
  [data-theme="dark"] .scrim { background: rgba(0,0,0,0.7); }
  @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { transform: translateY(8px); opacity: 0 } to { transform: none; opacity: 1 } }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); animation: slideUp .18s ease; }

  /* ── Animation tokens ──────────────────────────────────────────── */
  :root {
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
  @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { transform: translateY(8px); opacity: 0 } to { transform: none; opacity: 1 } }
  @keyframes riseIn { from { transform: translateY(14px); opacity: 0 } to { transform: none; opacity: 1 } }
  @keyframes starPop { 0% { transform: scale(1) } 35% { transform: scale(1.45) rotate(-12deg) } 70% { transform: scale(0.9) rotate(6deg) } 100% { transform: scale(1) rotate(0) } }
  @keyframes shimmerSweep { 0% { transform: translateX(-120%) skewX(-18deg) } 100% { transform: translateX(220%) skewX(-18deg) } }
  @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 var(--accent-soft) } 70% { box-shadow: 0 0 0 8px transparent } 100% { box-shadow: 0 0 0 0 transparent } }
  @keyframes pageEnter { from { opacity: 0; transform: translateY(6px) } to { opacity: 1; transform: none } }
  @keyframes checkPop { 0% { transform: scale(0.4); opacity: 0 } 100% { transform: scale(1); opacity: 1 } }
  @keyframes spin { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }

  /* Stagger reveal — apply to grid containers; children animate with delay */
  .stagger > * { animation: riseIn .42s var(--ease-out) both; }
  .stagger > *:nth-child(1) { animation-delay: 0ms }
  .stagger > *:nth-child(2) { animation-delay: 30ms }
  .stagger > *:nth-child(3) { animation-delay: 60ms }
  .stagger > *:nth-child(4) { animation-delay: 90ms }
  .stagger > *:nth-child(5) { animation-delay: 120ms }
  .stagger > *:nth-child(6) { animation-delay: 150ms }
  .stagger > *:nth-child(7) { animation-delay: 180ms }
  .stagger > *:nth-child(8) { animation-delay: 210ms }
  .stagger > *:nth-child(9) { animation-delay: 240ms }
  .stagger > *:nth-child(10) { animation-delay: 270ms }
  .stagger > *:nth-child(11) { animation-delay: 300ms }
  .stagger > *:nth-child(12) { animation-delay: 320ms }
  .stagger > *:nth-child(n+13) { animation-delay: 340ms }

  .page-enter { animation: pageEnter .35s var(--ease-out) both; }

  /* Folder tile */
  .folder-tile { position: relative; aspect-ratio: 4/3; border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); overflow: hidden; cursor: pointer; transition: border-color .25s var(--ease-out), transform .35s var(--ease-out), box-shadow .35s var(--ease-out); will-change: transform; }
  .folder-tile:hover { border-color: var(--fg); transform: translateY(-3px); box-shadow: 0 18px 40px -22px rgba(0,0,0,0.35); }
  .folder-tile:active { transform: translateY(-1px) scale(0.995); transition-duration: .08s; }
  .folder-tile .mosaic { position: absolute; inset: 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 1px; background: var(--line); transition: transform .6s var(--ease-out); }
  .folder-tile:hover .mosaic { transform: scale(1.04); }
  .folder-tile .mosaic > * { background-color: var(--bg); min-width: 0; min-height: 0; overflow: hidden; }
  .folder-tile .mosaic > * > img, .folder-tile .mosaic > * > .ph { transition: transform .6s var(--ease-out); }
  .folder-tile:hover .mosaic > *:nth-child(1) > * { transform: scale(1.06) translate(-1%, -1%); }
  .folder-tile:hover .mosaic > *:nth-child(2) > * { transform: scale(1.06) translate(1%, -1%); }
  .folder-tile:hover .mosaic > *:nth-child(3) > * { transform: scale(1.06) translate(-1%, 1%); }
  .folder-tile:hover .mosaic > *:nth-child(4) > * { transform: scale(1.06) translate(1%, 1%); }
  .folder-tile .label { position: absolute; left: 0; right: 0; bottom: 0; padding: 10px 12px; background: linear-gradient(180deg, transparent, rgba(0,0,0,0.7)); color: white; display: flex; justify-content: space-between; align-items: end; gap: 8px; transform: translateY(0); transition: transform .35s var(--ease-out); }
  .folder-tile .label .name { font-weight: 500; font-size: 13px; line-height: 1.2; }
  .folder-tile .label .count { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
  /* Shimmer sweep on folder tile */
  .folder-tile::before { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent); transform: translateX(-120%) skewX(-18deg); pointer-events: none; z-index: 3; opacity: 0; }
  .folder-tile:hover::before { animation: shimmerSweep .9s var(--ease-out) .05s; opacity: 1; }

  /* Asset tile */
  .asset-tile { position: relative; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; cursor: pointer; background: var(--panel); aspect-ratio: var(--ar, 1); transition: border-color .2s var(--ease-out), transform .35s var(--ease-out), box-shadow .35s var(--ease-out); will-change: transform; }
  .asset-tile:hover { border-color: var(--fg); transform: translateY(-2px); box-shadow: 0 14px 32px -18px rgba(0,0,0,0.45); z-index: 1; }
  .asset-tile:active { transform: translateY(0) scale(0.985); transition-duration: .08s; }
  .asset-tile.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent) inset, 0 14px 32px -18px rgba(0,0,0,0.45); animation: pulseRing .6s var(--ease-out); }
  .asset-tile .ph { width: 100%; height: 100%; }
  /* zoom anything image-like inside the tile on hover — slow, silky ken-burns */
  .asset-tile img, .asset-tile > .ph, .asset-tile > div > img {
    transition: transform 3.2s cubic-bezier(0.16, 0.84, 0.24, 1), filter .6s var(--ease-out);
    transform-origin: center;
    will-change: transform;
    backface-visibility: hidden;
  }
  .asset-tile:hover img, .asset-tile:hover > .ph, .asset-tile:hover > div > img {
    transform: scale(1.08);
    transition-duration: 4.5s, .6s;
  }
  .asset-tile.selected img, .asset-tile.selected > .ph, .asset-tile.selected > div > img { transform: scale(1.03); }
  .asset-tile .meta { position: absolute; left: 0; right: 0; bottom: 0; padding: 10px 10px 10px; background: linear-gradient(180deg, transparent, rgba(0,0,0,0.7)); color: white; opacity: 0; transform: translateY(6px); transition: opacity .25s var(--ease-out), transform .25s var(--ease-out); pointer-events: none; }
  .asset-tile:hover .meta { opacity: 1; transform: translateY(0); }
  .asset-tile .badge { position: absolute; top: 8px; left: 8px; }
  .asset-tile .sel-check { position: absolute; top: 8px; left: 8px; width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid white; background: rgba(0,0,0,0.35); color: white; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.25; transform: scale(0.8); transition: opacity .2s var(--ease-out), transform .25s var(--ease-spring), background .2s; padding: 0; backdrop-filter: blur(4px); z-index: 2; }
  .asset-tile:hover .sel-check, .asset-tile.selected .sel-check { opacity: 1; transform: scale(1); }
  .asset-tile .sel-check.on { background: var(--accent); border-color: var(--accent); opacity: 1; transform: scale(1); }
  .asset-tile .sel-check.on > svg { animation: checkPop .25s var(--ease-spring); }
  .asset-tile .sel-check:hover { transform: scale(1.12); }
  .asset-tile .fav-btn { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; border: none; background: rgba(0,0,0,0.35); color: white; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transform: scale(0.7); transition: opacity .2s var(--ease-out), transform .25s var(--ease-spring), color .2s, background .2s; padding: 0; backdrop-filter: blur(4px); z-index: 2; }
  .asset-tile:hover .fav-btn { opacity: 1; transform: scale(1); }
  .asset-tile .fav-btn.on { opacity: 1; transform: scale(1); color: oklch(80% 0.16 80); background: rgba(0,0,0,0.6); }
  .asset-tile .fav-btn.on > svg { animation: starPop .5s var(--ease-spring); }
  .asset-tile .fav-btn:hover { background: rgba(0,0,0,0.7); transform: scale(1.15); }

  /* Bulk action bar */
  .bulkbar { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--fg); color: var(--bg); border-radius: var(--radius); margin-bottom: 16px; box-shadow: 0 6px 24px rgba(0,0,0,0.18); }
  .bulkbar .btn { background: transparent; border-color: transparent; color: var(--bg); }
  .bulkbar .btn:hover { background: rgba(255,255,255,0.12); }
  .bulkbar .divider { width: 1px; align-self: stretch; background: rgba(255,255,255,0.18); margin: 0 4px; }

  /* Favorite indicator in list row */
  .list-fav { width: 24px; height: 24px; border: none; background: transparent; color: var(--muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; padding: 0; border-radius: 4px; transition: background .18s, color .18s, transform .2s var(--ease-spring); }
  .list-fav:hover { background: var(--hover); color: var(--fg); transform: scale(1.15); }
  .list-fav.on { color: oklch(70% 0.16 80); }
  .list-fav.on > svg { animation: starPop .5s var(--ease-spring); }

  /* List row hover sweep */
  .card > .row { transition: background .18s ease, padding-left .2s var(--ease-out); position: relative; }
  .card > .row:not([style*="border-bottom: 1px solid var(--line)"]):hover { background: var(--hover); }
  .card > .row:hover { background: var(--hover); padding-left: 22px; }

  /* Tag card hover actions */
  .tag-card .tag-actions { opacity: 0; transition: opacity .18s; }
  .tag-card:hover .tag-actions { opacity: 1; }

  /* Chip animation */
  .chip { transition: background .18s, color .18s, border-color .18s, transform .18s var(--ease-spring); }
  .chip:hover { transform: translateY(-1px); }

  /* Area switcher tabs */
  .area-tab { transition: background .22s var(--ease-out), color .18s, transform .12s; }
  .area-tab:active { transform: scale(0.96); }

  /* Folder mosaic in sidebar — small lift */
  .folder-row { transition: background .18s, padding-left .18s var(--ease-out), outline .12s, color .15s; }

  /* Drop target highlight — folder receives dragged assets */
  .folder-row.drop-target {
    background: var(--accent-soft) !important;
    color: var(--accent);
    outline: 1px solid var(--accent);
    outline-offset: -1px;
    border-radius: var(--radius);
  }
  .folder-row.drop-target .count { color: var(--accent); }

  /* Asset tile while being dragged */
  .asset-tile.dragging { opacity: 0.45; cursor: grabbing; }

  /* Bulkbar slide-in */
  .bulkbar { animation: slideUp .25s var(--ease-out); }

  /* Tag dot pulse on hover of chip */
  .chip:hover .tag-dot { animation: pulseRing .8s var(--ease-out); }

  /* Heading scale */
  .h-display { font-size: 56px; font-weight: 500; letter-spacing: -0.03em; line-height: 1; }
  .h-1 { font-size: 32px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.05; }
  .h-2 { font-size: 22px; font-weight: 500; letter-spacing: -0.015em; line-height: 1.15; }
  .h-3 { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

  /* Activity dot */
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }

  /* Sidebar nav */
  .nav-item { position: relative; display: flex; align-items: center; gap: 10px; height: 32px; padding: 0 10px; border-radius: var(--radius); color: var(--fg-2); cursor: pointer; font-size: 13px; transition: background .18s ease, color .18s ease, padding .2s var(--ease-out); }
  .nav-item::before { content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px; background: var(--accent); border-radius: 2px; transform: scaleY(0); transform-origin: center; transition: transform .2s var(--ease-spring); }
  .nav-item:hover { background: var(--hover); color: var(--fg); padding-left: 12px; }
  .nav-item.active, .nav-item[data-active="true"] { background: var(--hover); color: var(--fg); font-weight: 500; padding-left: 14px; }
  .nav-item.active::before, .nav-item[data-active="true"]::before { transform: scaleY(1); }
  .nav-item .count { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--muted); transition: color .2s; }
  .nav-item:hover .count { color: var(--fg); }

  /* Area switcher */
  .area-switcher { display: grid; grid-template-columns: 1fr 1fr; padding: 3px; gap: 2px; background: var(--hover); border-radius: var(--radius); border: 1px solid var(--line); }
  .area-tab { display: inline-flex; align-items: center; justify-content: center; gap: 8px; height: 30px; padding: 0 8px; border-radius: 3px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; transition: background .12s, color .12s; }
  .area-tab:hover { color: var(--fg); }
  .area-tab.active { background: var(--panel); color: var(--fg); box-shadow: 0 1px 0 rgba(0,0,0,0.04); }
  [data-theme="dark"] .area-tab.active { background: var(--line-strong); }

  /* Folder row CRUD */
  .folder-row { cursor: grab; }
  .folder-row:active { cursor: grabbing; }
  .folder-row .folder-more { opacity: 0; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; border-radius: 3px; color: var(--muted); }
  .folder-row:hover .folder-more { opacity: 1; }
  .folder-row .folder-more:hover { background: var(--line-strong); color: var(--fg); }
  .folder-row.drop-target { box-shadow: inset 0 -2px 0 var(--accent); }

  .menu-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 3px; font-size: 12px; cursor: pointer; color: var(--fg-2); }
  .menu-item:hover { background: var(--hover); color: var(--fg); }
  .menu-item.danger { color: var(--accent); }
  .menu-item.danger:hover { background: var(--accent-soft); }

  /* Tag pills with color dot */
  .tag-dot { width: 8px; height: 8px; border-radius: 2px; flex: none; }

  /* Drop zone */
  .dropzone { border: 1px dashed var(--line-strong); border-radius: var(--radius); padding: 48px 24px; text-align: center; background: var(--panel); transition: background .12s, border-color .12s; }
  .dropzone.over { border-color: var(--accent); background: var(--accent-soft); }

  /* Settings */
  .field-grid { display: grid; grid-template-columns: 200px 1fr; gap: 16px 32px; align-items: start; padding: 20px 0; border-bottom: 1px solid var(--line); }
  .field-grid:last-child { border-bottom: none; }
  .field-label { font-weight: 500; font-size: 13px; }
  .field-hint { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--fg); color: var(--bg); padding: 10px 16px; border-radius: var(--radius); font-size: 13px; box-shadow: var(--shadow); z-index: 80; animation: slideUp .28s var(--ease-spring); display: flex; align-items: center; gap: 10px; }

  /* Toggle */
  .toggle { width: 32px; height: 18px; background: var(--line-strong); border-radius: 100px; position: relative; cursor: pointer; transition: background .12s; }
  .toggle.on { background: var(--fg); }
  .toggle::after { content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: var(--panel); border-radius: 50%; transition: left .12s; }
  .toggle.on::after { left: 16px; }

  .clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  .clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* Share page (external) */
  .share-page { min-height: 100vh; background: var(--bg); }
  .share-header { border-bottom: 1px solid var(--line); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
</style>
